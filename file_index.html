<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <title></title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+CiAgPGRlZnM+CiAgICA8bGluZWFyR3JhZGllbnQgaWQ9ImciIHgxPSIwIiB5MT0iMCIgeDI9IjAiIHkyPSIxIj4KICAgICAgPHN0b3Agb2Zmc2V0PSIwIiBzdG9wLWNvbG9yPSIjZjZjNDUzIi8+CiAgICAgIDxzdG9wIG9mZnNldD0iMSIgc3RvcC1jb2xvcj0iI2UzYTEyOSIvPgogICAgPC9saW5lYXJHcmFkaWVudD4KICA8L2RlZnM+CiAgPHBhdGggZD0iTTggMTZhNCA0IDAgMCAxIDQtNGgxNGw2IDZoMjBhNCA0IDAgMCAxIDQgNHY0SDh6IiBmaWxsPSIjZjJkMjhhIi8+CiAgPHJlY3QgeD0iOCIgeT0iMjIiIHdpZHRoPSI0OCIgaGVpZ2h0PSIyNiIgcng9IjQiIGZpbGw9InVybCgjZykiIHN0cm9rZT0iI2MyN2MwZSIgc3Ryb2tlLXdpZHRoPSIxIi8+Cjwvc3ZnPg==">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.6/css/all.css">

    <style>
        :root {
            --bg: #fff;
            --fg: #333;
            --muted: #646464;
            --link: #337ab7;
            --link-hover: #23527c;
            --border: #ddd;
            --stripe: #f9f9f9;
            --hover: #f5f5f5;
            --control: #fff;
            --control-border: #ccc;
            --control-hover: #e6e6e6;
            --toggle: #2f3136;
            --toggle-fg: #f8d47a;
            color-scheme: light;
        }

        :root[data-theme="dark"] {
            --bg: #242322;
            --fg: #e7e1d8;
            --muted: #b7aea2;
            --link: #8db9e8;
            --link-hover: #b7d4f3;
            --border: #44413f;
            --stripe: #2b2a28;
            --hover: #33312f;
            --control: #343230;
            --control-border: #5f5a54;
            --control-hover: #3c3936;
            --toggle: #eee8de;
            --toggle-fg: #3c3834;
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding-inline: 15px;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            font-size: 16px;
            line-height: 1.42857143;
            color: var(--fg);
            background-color: var(--bg);
        }

        button,
        input,
        textarea {
            margin: 0;
            color: inherit;
            font: inherit;
        }

        button {
            padding: 0;
            border: 0;
            background: transparent;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        a {
            color: var(--link);
            text-decoration: none;
        }

        a:hover,
        a:focus {
            color: var(--link-hover);
            text-decoration: underline;
        }

        h1,
        h4 {
            font-weight: 500;
            line-height: 1.1;
        }

        h1 {
            margin: 20px 0 10px;
            font-size: 36px;
        }

        h4 {
            margin: 10px 0;
            font-size: 18px;
        }

        label {
            display: inline-block;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .btn,
        .form-control {
            border: 1px solid var(--control-border);
            border-radius: 4px;
            color: var(--fg);
            background-color: var(--control);
            font-size: 14px;
        }

        .btn {
            display: inline-block;
            padding: 6px 12px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .btn:hover {
            background-color: var(--control-hover);
            text-decoration: none;
        }

        .btn-group {
            display: inline-flex;
            vertical-align: middle;
        }

        .btn-group > .btn + .btn {
            margin-left: -1px;
        }

        .btn-group > .btn:not(:first-child) {
            border-top-left-radius: 0;
            border-bottom-left-radius: 0;
        }

        .btn-group > .btn:not(:last-child) {
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
        }

        .btn-group-sm > .btn {
            padding: 5px 10px;
            border-radius: 3px;
            font-size: 12px;
            line-height: 1.5;
        }

        .file-grid {
            display: grid;
            grid-template-columns: minmax(12em, 1fr) max-content 28px repeat(6, max-content) max-content;
            margin: 20px 0;
        }

        .file-grid-header,
        .file-grid-body,
        .file-row {
            display: contents;
        }

        .file-cell {
            min-width: 0;
            padding: 5px;
            border-top: 1px solid var(--border);
        }

        .file-grid-header > .file-cell {
            border-top: 0;
            border-bottom: 2px solid var(--border);
            font-weight: 700;
        }

        .file-row:first-child > .file-cell {
            border-top: 0;
        }

        .file-row:nth-child(odd) > .file-cell {
            background-color: var(--stripe);
        }

        .file-row:hover > .file-cell {
            background-color: var(--hover);
        }

        .date-part {
            padding-inline: 2px;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .date-gutter {
            padding: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-control {
            display: block;
            width: 100%;
            height: 34px;
            padding: 6px 12px;
        }

        .checkbox-inline label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
        }

        .modal {
            position: fixed;
            inset: 0;
            z-index: 1050;
            display: none;
        }

        .modal-dialog {
            position: relative;
            width: fit-content;
            max-width: calc(100vw - 30px);
            margin: 30px auto;
        }

        .modal-content {
            max-width: 100%;
            border: 1px solid var(--control-border);
            border-radius: 6px;
            background-color: var(--stripe);
            box-shadow: 0 3px 9px rgba(0, 0, 0, .55);
        }

        .modal-header,
        .modal-body,
        .modal-footer {
            padding: 15px;
        }

        .modal-header {
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            margin: 0;
        }

        .modal-footer {
            border-top: 1px solid var(--border);
            text-align: right;
        }

        .close {
            float: right;
            font-size: 21px;
            font-weight: 700;
            line-height: 1;
            opacity: .2;
        }

        .close:hover,
        .close:focus {
            opacity: .5;
        }

        .modal-backdrop {
            position: fixed;
            inset: 0;
            z-index: 1040;
            background-color: #000;
            opacity: .5;
        }

        .fileicon {
            color: var(--muted);
        }

        .td-file-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .td-file-date-header,
        .td-file-date-empty {
            grid-column: span 6;
            white-space: nowrap;
        }

        .td-file-size,
        .date-day,
        .date-year,
        .date-time {
            text-align: right;
        }

        .td-file-action,
        .td-file-action-header {
            padding-left: 10px;
            text-align: center;
            white-space: nowrap;
        }

        .zip-row-button {
            width: 22px;
            height: 22px;
            padding: 0;
            border-radius: 3px;
            font-size: 12px;
            line-height: 20px;
        }

        .dl-textarea {
            width: 640px;
            height: auto;
            min-width: min(520px, calc(100vw - 60px));
            max-width: min(900px, calc(100vw - 60px));
            white-space: pre;
            overflow: auto;
            resize: both;
        }

        .theme-toggle {
            position: fixed;
            right: 18px;
            bottom: 18px;
            z-index: 1060;
            width: 44px;
            height: 44px;
            padding: 0;
            border-radius: 50%;
            color: var(--toggle-fg);
            background-color: var(--toggle);
            box-shadow: 0 3px 12px rgba(0, 0, 0, .35);
            font-size: 18px;
            line-height: 44px;
        }

        .theme-toggle:hover,
        .theme-toggle:focus {
            color: var(--toggle-fg);
            background-color: var(--toggle);
        }

        .status-toast {
            position: fixed;
            left: 50%;
            bottom: 18px;
            z-index: 1070;
            display: flex;
            align-items: center;
            gap: 10px;
            width: max-content;
            max-width: min(480px, calc(100vw - 30px));
            padding: 10px 12px;
            border: 1px solid var(--control-border);
            border-radius: 6px;
            background-color: var(--control);
            box-shadow: 0 4px 16px rgba(0, 0, 0, .35);
            line-height: 1.35;
            transform: translateX(-50%);
        }

        .status-toast[hidden] {
            display: none;
        }

        .status-toast.is-error {
            border-color: #b94a48;
        }

        .status-toast.is-success {
            border-color: #3c763d;
        }

        .status-toast-icon {
            flex: 0 0 auto;
            color: var(--muted);
        }

        .status-toast-message {
            min-width: 0;
            overflow-wrap: break-word;
        }
    </style>
    <script>
        (function () {
            const savedTheme = localStorage.getItem("pretty-file-index-theme");
            if (savedTheme === "dark") {
                document.documentElement.setAttribute("data-theme", "dark");
            }
        })();
    </script>
</head>

<body>
<div id="filelist-container">
    <h1 id="headerline">Index of </h1>
    <button type="button" class="btn" onclick="openModal()">
        <i class="fas fa-download"></i>
        &nbsp;Download All
    </button>
    <div id="filelist-grid" class="file-grid" role="table">
        <div class="file-grid-header" role="row">
            <div class="file-cell td-file-name" role="columnheader">File Name</div>
            <div class="file-cell td-file-size" role="columnheader">File Size</div>
            <div class="file-cell date-gutter" role="presentation"></div>
            <div class="file-cell td-file-date-header" role="columnheader">Date</div>
            <div class="file-cell td-file-action-header" role="columnheader"></div>
        </div>
        <div id="filelist-body" class="file-grid-body" role="rowgroup"></div>
    </div>
</div>

<div class="modal" id="download-modal" aria-labelledby="download-modal-label" aria-modal="true"
     role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" aria-label="Close" onclick="closeModal()">&times;</button>
                <h4 class="modal-title" id="download-modal-label"><i class="fas fa-download"></i>&nbsp;Download All</h4>
            </div>
            <div class="modal-body">
                <div class="checkbox-inline">
                    <label><input type="checkbox" id="include-subdirectories">Include subdirectories</label>
                </div>
                <div class="btn-group btn-group-sm" style="float: right;">
                    <button type="button" id="download-zip-button" class="btn"><i
                            class="far fa-file-archive"></i>&nbsp;Download ZIP
                    </button>
                    <button type="button" id="copy-downloads-button" class="btn"><i
                            class="far fa-clipboard"></i>&nbsp;Copy To Clipboard
                    </button>
                </div>
                <div class="download-links-container form-group">
                    <label for="download-links"></label><textarea id="download-links" class="form-control dl-textarea" rows="15" readonly></textarea>
                </div>

                <div class="download-links-template-container form-group">
                    <label for="download-links-template">Template</label>
                    <div class="btn-group btn-group-sm" style="float: right;">
                        <button type="button" class="btn" onclick="changeTemplate('raw')">raw</button>
                        <button type="button" class="btn" onclick="changeTemplate('curl')">cURL</button>
                        <button type="button" class="btn" onclick="changeTemplate('wget')">wget</button>
                    </div>
                    <input type="text" id="download-links-template" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn" onclick="closeModal();">Close</button>
            </div>
        </div>
    </div>
</div>
<div class="modal-backdrop" id="backdrop" style="display: none;"></div>
<div id="status-toast" class="status-toast" role="status" aria-live="polite" hidden>
    <i class="status-toast-icon fas fa-info-circle" aria-hidden="true"></i>
    <span class="status-toast-message"></span>
</div>
<button type="button" class="btn theme-toggle" id="theme-toggle" aria-label="Switch to dark mode" title="Switch to dark mode">
    <i class="fas fa-moon" aria-hidden="true"></i>
</button>

<script>
    const iconObject = {
        "far fa-file-archive": ["rar", "zip", "7z", "gz", "bz2", "tgz", "tbz2", "tar"],
        "far fa-file-video": ["mkv", "mp4", "webm", "avi", "m4v", "h264", "mpg", "m2v", "mpeg", "ts", "m2ts", "vob", "mov"],
        "far fa-file-audio": ["mka", "mp3", "aac", "ac3", "m4a", "flac", "pcm", "wav", "wma"],
        "far fa-file-text": ["txt", "log", "mks", "ass", "ssa", "srt"],
        "far fa-file-image": ["png", "jpg", "jpeg", "bmp", "gif", "ico", "svg", "tiff", "tif"],
        "far fa-file-code": ["php", "html", "htm", "js", "ts", "css", "avs", "vpy", "bat", "sh", "xml", "ini", "json", "py", "cpp", "c", "hpp", "h"],
        "far fa-file-pdf": ["pdf"]
    };

    const folderIcon = "fas fa-folder";
    const defaultIcon = "far fa-file";

    const themeStorageKey = "pretty-file-index-theme";

    const dlTemplates = {
        raw: "{0}",
        curl: "curl --create-dirs '{0}' -o '{1}'",
        wget: "wget '{0}'"
    };

    document.getElementById("download-links-template").addEventListener("input", function () {
        fillDownloadLinks();
    });

    document.getElementById("include-subdirectories").addEventListener("change", function () {
        fillDownloadLinks();
    });

    document.getElementById("copy-downloads-button").addEventListener("click", async () => {
        const textarea = document.getElementById("download-links");
        await navigator.clipboard.writeText(textarea.value);
    });

    document.getElementById("download-zip-button").addEventListener("click", function () {
        startZipDownload();
    });

    document.getElementById("filelist-body").addEventListener("click", function (event) {
        const zipButton = event.target.closest("[data-zip-url]");
        if (!zipButton) {
            return;
        }

        const directoryUrl = zipButton.getAttribute("data-zip-url");

        startZipDownload({
            button: zipButton,
            collectFiles: async function () {
                const page_data = await fetch_page_json(directoryUrl);
                return collect_download_entries(page_data, directoryUrl, true);
            },
            filenameBase: zipButton.getAttribute("data-zip-filename")
        });
    });

    let current_page_data = [];
    let zip_download_in_progress = false;
    const zip_download_warning_message = "A ZIP download is still running. Keep this tab open until it finishes.";
    let status_hide_timer = 0;
    const filenameCollator = new Intl.Collator(undefined, {
        numeric: true,
        sensitivity: "base"
    });
    let filenameSortDirection = "asc";
    let download_links_fill_request = 0;

    function update() {
        const headline = document.getElementById("headerline");
        headline.textContent = "Index of " + decodeURIComponent(window.location.pathname);
        document.title = decodeURIComponent(window.location.pathname) + " - " + decodeURIComponent(window.location.host);
        fetch_page_json("/list" + window.location.pathname)
            .then(function (page_data) {
                document.getElementById("filelist-grid").style.display = 'grid';
                current_page_data = page_data;
                renderCurrentPageData();
            })
            .catch(function (err) {
                document.getElementById("filelist-grid").style.display = 'none';
                headline.innerHTML = "<h1 style=\"color: red\"><a href=\".\" onclick=\"history.back(); return false;\" style=\"text-decoration: none; color: gray; padding-right: 15px\"><i class=\"fas fa-chevron-left\"></i></a>" + err + "</h1>";
            });
    }

    function on_click_link(ele) {
        history.pushState({}, "", ele.pathname);
        update();
    }

    function warn_before_leaving_during_zip_download(event) {
        if (!zip_download_in_progress) {
            return;
        }

        event.preventDefault();
        event.returnValue = zip_download_warning_message;
        return zip_download_warning_message;
    }

    function should_warn_about_anchor_navigation(link, event) {
        if (!zip_download_in_progress || event.defaultPrevented || event.button !== 0) {
            return false;
        }
        if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
            return false;
        }
        if (link.hasAttribute("download")) {
            return false;
        }
        if (link.target && link.target.toLowerCase() !== "_self") {
            return false;
        }

        const url = new URL(link.href, window.location.href);
        return url.href !== window.location.href && !url.pathname.startsWith("/__zip_download__/");
    }

    window.addEventListener("beforeunload", warn_before_leaving_during_zip_download);

    document.addEventListener("click", function (event) {
        const link = event.target.closest("a[href]");
        if (!link || !should_warn_about_anchor_navigation(link, event)) {
            return;
        }

        if (!window.confirm(zip_download_warning_message)) {
            event.preventDefault();
        }
    });

    window.onpopstate = function (_) {
        update();
    };

    document.addEventListener("DOMContentLoaded", function () {
        const themeToggle = document.getElementById("theme-toggle");
        themeToggle.addEventListener("click", toggleTheme);
        updateThemeToggle();

        const fileNameHeader = document.querySelector(".file-grid-header .td-file-name");
        fileNameHeader.classList.add("th-sortable");
        fileNameHeader.addEventListener("click", toggleFilenameSortDirection);
        updateFilenameSortHeader();
        update();
    }, false);

    function getCurrentTheme() {
        return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
    }

    function setTheme(theme) {
        if (theme === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
        } else {
            document.documentElement.removeAttribute("data-theme");
        }

        localStorage.setItem(themeStorageKey, theme);
        updateThemeToggle();
    }

    function toggleTheme() {
        setTheme(getCurrentTheme() === "dark" ? "light" : "dark");
    }

    function updateThemeToggle() {
        const themeToggle = document.getElementById("theme-toggle");
        const isDark = getCurrentTheme() === "dark";
        themeToggle.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
        themeToggle.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
        themeToggle.innerHTML = "<i class=\"fas " + (isDark ? "fa-sun" : "fa-moon") + "\" aria-hidden=\"true\"></i>";
    }

    function getSortedCurrentPageData() {
        const sorted = current_page_data.slice();
        sorted.sort(function (a, b) {
            const aIsDirectory = a.type === "directory";
            const bIsDirectory = b.type === "directory";
            if (aIsDirectory !== bIsDirectory) {
                if (filenameSortDirection === "asc") {
                    return aIsDirectory ? -1 : 1;
                }
                return aIsDirectory ? 1 : -1;
            }
            const cmp = filenameCollator.compare(a.name, b.name);
            return filenameSortDirection === "desc" ? -cmp : cmp;
        });
        return sorted;
    }

    function renderCurrentPageData() {
        const body = document.getElementById("filelist-body");
        const currentHref = escape_HTML(window.location.origin + window.location.pathname.replace(/\/$/, ""));
        const currentListUrl = escape_HTML("/list" + window.location.pathname);
        const currentFilenameBase = decodeURIComponent(window.location.pathname).replace(/\/+$/, "").split("/").filter(Boolean).pop() || "download";
        const currentFolderZipButton = "<button type=\"button\" class=\"btn zip-row-button\" data-zip-url=\"" + currentListUrl + "\" data-zip-filename=\"" + escape_HTML(currentFilenameBase) + "\" title=\"Download current directory as ZIP\" aria-label=\"Download current directory as ZIP\"><i class=\"far fa-file-archive\" aria-hidden=\"true\"></i></button>";
        body.innerHTML = "";
        body.insertAdjacentHTML("beforeend", "<div class='file-row' role='row'><div class='file-cell td-file-name' role='cell'><a href='../' onclick=\"on_click_link(this); return false;\">../</a></div><div class='file-cell td-file-size' role='cell'></div><div class='file-cell date-gutter' role='presentation'></div><div class='file-cell td-file-date-empty' role='cell'></div><div class='file-cell td-file-action' role='cell'>" + currentFolderZipButton + "</div></div>");

        const entries = getSortedCurrentPageData();
        for (let entry of entries) {
            const icon = getIconString(entry);
            const isDirectory = entry.type === "directory";
            const onclick_str = isDirectory ? " onclick=\"on_click_link(this); return false;\"" : "";
            const href = currentHref + "/" + entry.encodedName + (isDirectory ? "/" : "");
            const zipButton = isDirectory
                ? "<button type=\"button\" class=\"btn zip-row-button\" data-zip-url=\"" + currentListUrl + entry.encodedName + "/\" data-zip-filename=\"" + entry.escapedName + "\" title=\"Download directory as ZIP\" aria-label=\"Download " + entry.escapedDisplayName + " as ZIP\"><i class=\"far fa-file-archive\" aria-hidden=\"true\"></i></button>"
                : "";

            body.insertAdjacentHTML("beforeend",
                "<div class='file-row' role='row'>" +
                "<div class='file-cell td-file-name' role='cell'><a href=\"" + href + "\"" + onclick_str + "><span class='fileicon " + icon + "'></span> " + entry.escapedDisplayName + "</a></div>" +
                "<div class='file-cell td-file-size' role='cell'>" + (isDirectory ? '-' : formatBytes(entry.size)) + "</div>" +
                "<div class='file-cell date-gutter' role='presentation'></div>" +
                formatDateCell(entry.mtime) +
                "<div class='file-cell td-file-action' role='cell'>" + zipButton + "</div>" +
                "</div>");
        }
    }

    function toggleFilenameSortDirection() {
        filenameSortDirection = filenameSortDirection === "asc" ? "desc" : "asc";
        updateFilenameSortHeader();
        renderCurrentPageData();
    }

    function updateFilenameSortHeader() {
        const fileNameHeader = document.querySelector(".file-grid-header .td-file-name");
        fileNameHeader.textContent = "File Name " + (filenameSortDirection === "asc" ? "▲" : "▼");
    }

    function getIconString(entry) {
        if (entry.type === "directory") {
            return folderIcon;
        }
        const ext = entry.name.split(".").pop().toLowerCase();
        for (const iconKey in iconObject) {
            if (iconObject[iconKey].indexOf(ext) !== -1) {
                return iconKey;
            }
        }
        return defaultIcon;
    }

    function formatDateCell(mtime) {
        const parts = mtime.match(/^([A-Za-z]{3},) (\d{2}) ([A-Za-z]{3}) (\d{4}) (\d{2}:\d{2}:\d{2}) ([A-Z]+)$/);
        return "<div class=\"file-cell date-part date-weekday\" role=\"cell\">" + parts[1] + "</div>" +
            "<div class=\"file-cell date-part date-day\" role=\"cell\">" + parts[2] + "</div>" +
            "<div class=\"file-cell date-part date-month\" role=\"cell\">" + parts[3] + "</div>" +
            "<div class=\"file-cell date-part date-year\" role=\"cell\">" + parts[4] + "</div>" +
            "<div class=\"file-cell date-part date-time\" role=\"cell\">" + parts[5] + "</div>" +
            "<div class=\"file-cell date-part date-zone\" role=\"cell\">" + parts[6] + "</div>";
    }

    function formatBytes(bytes) {
        if (bytes === 0) {
            return '0 Bytes';
        }
        const k = 1024,
            sizes = ['Bytes', 'KiB', 'MiB', 'GiB', 'TiB', 'PiB', 'EiB', 'ZiB', 'YiB'],
            i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
    }

    function changeTemplate(template) {
        document.getElementById("download-links-template").value = dlTemplates[template];
        fillDownloadLinks();
    }

    async function collect_download_entries(page_data, url_path, getRecursive, zipPrefix = "") {
        const entries = [];
        const subdirectory_fetches = [];
        const file_path = url_path.substring(5);

        for (let entry of page_data) {
            if (entry.type === "directory") {
                if (getRecursive) {
                    const recursion_url = url_path + entry.encodedName + "/";
                    subdirectory_fetches.push(fetch_page_json(recursion_url).then(function (recursion_page_data) {
                        return collect_download_entries(recursion_page_data, recursion_url, true, zipPrefix + entry.name + "/");
                    }));
                }
                continue;
            }

            const file_link = window.location.origin + file_path + entry.encodedName;
            entries.push({
                url: file_link,
                downloadPath: file_path.replace(window.location.pathname, "") + entry.encodedName,
                path: zipPrefix + entry.name,
                mtime: entry.mtime,
                size: entry.size
            });
        }

        const subdirectory_entries = await Promise.all(subdirectory_fetches);
        for (let entry_list of subdirectory_entries) {
            entries.push(...entry_list);
        }

        return entries;
    }

    async function fetch_page_json(url) {
        let resp = await fetch(url);
        if (resp.status !== 200) {
            throw resp.status + " " + resp.statusText;
        }
        const t = await resp.text();
        if (t.length === 0) {
            return [];
        }
        const page_data = JSON.parse(t);
        for (let entry of page_data) {
            entry.name = entry.name.replace(/\/+$/, "");
            entry.encodedName = encodeURIComponent(entry.name);
            entry.escapedName = escape_HTML(entry.name);
            entry.escapedDisplayName = escape_HTML(entry.type === "directory" ? entry.name + "/" : entry.name);
        }
        return page_data;
    }

    async function fillDownloadLinks() {
        const fill_request = ++download_links_fill_request;
        const textField = document.getElementById("download-links");
        const includeSub = document.getElementById("include-subdirectories");
        const template = document.getElementById("download-links-template").value;
        const entries = await collect_download_entries(current_page_data, "/list" + window.location.pathname, includeSub.checked);
        if (fill_request !== download_links_fill_request) {
            return;
        }

        textField.value = "";
        for (let entry of entries) {
            // first template arg is just the download link, second arg is the path and filename relative to the base dir
            textField.value += formatDownloadTemplate(template, entry.url, entry.downloadPath);
            textField.value += "\n";
        }
    }

    function formatDownloadTemplate(template, url, downloadPath) {
        return template.replace(/\{([01])}/g, function (_, index) {
            return index === "0" ? url : downloadPath;
        });
    }

    async function startZipDownload(options = {}) {
        const zipButton = options.button || document.getElementById("download-zip-button");
        const includeSub = document.getElementById("include-subdirectories");

        zipButton.disabled = true;

        try {
            if (!("serviceWorker" in navigator)) {
                showStatus("Service workers are not available in this browser.", "error");
                return;
            }
            if (!window.isSecureContext) {
                showStatus("Service workers require HTTPS.", "error");
                return;
            }

            showStatus("Collecting files...");
            const files = options.collectFiles
                ? await options.collectFiles()
                : await collect_download_entries(current_page_data, "/list" + window.location.pathname, includeSub.checked);
            if (files.length === 0) {
                showStatus("No files to zip.", "error", 5000);
                return;
            }

            showStatus("Preparing ZIP...");
            await navigator.serviceWorker.register("/sw.js", {scope: "/"});
            const registration = await navigator.serviceWorker.ready;

            if (!navigator.serviceWorker.controller) {
                const controllerChanged = new Promise(function (resolve) {
                    navigator.serviceWorker.addEventListener("controllerchange", resolve, {once: true});
                });
                registration.active.postMessage({type: "CLAIM_CLIENTS"});
                await controllerChanged;
            }

            const path = decodeURIComponent(window.location.pathname).replace(/\/+$/, "");
            const lastPart = options.filenameBase || path.split("/").filter(Boolean).pop() || "download";
            const filename = lastPart.replace(/[\\/:*?"<>|]+/g, "_") + ".zip";
            const token = crypto.randomUUID();

            const createJobResponse = await post_service_worker_message({
                type: "ZIP_CREATE_JOB",
                token: token,
                filename: filename,
                files: files
            }, 2000);
            if (createJobResponse === null) {
                console.error("Timed out waiting for ZIP_CREATE_JOB response.");
            }
            showStatus("Starting download...");
            const downloadLink = document.createElement("a");
            downloadLink.href = "/__zip_download__/" + encodeURIComponent(token) + "/" + encodeURIComponent(filename);
            downloadLink.download = filename;
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            downloadLink.remove();

            start_zip_keepalive().then(() => {});
            showStatus("Downloading ZIP. Keep this tab open.");
        } catch (err) {
            console.error(err);
            showStatus("ZIP download failed: " + err, "error");
        } finally {
            zipButton.disabled = false;
        }
    }

    function showStatus(message, type, hideAfterMs) {
        const toast = document.getElementById("status-toast");
        const icon = toast.querySelector(".status-toast-icon");
        toast.querySelector(".status-toast-message").textContent = message;
        toast.className = "status-toast" + (type ? " is-" + type : "");
        icon.className = "status-toast-icon " + getStatusIconClass(type);
        toast.hidden = false;

        clearTimeout(status_hide_timer);
        status_hide_timer = 0;

        if (hideAfterMs) {
            status_hide_timer = setTimeout(hideStatus, hideAfterMs);
        }
    }

    function hideStatus() {
        document.getElementById("status-toast").hidden = true;
        status_hide_timer = 0;
    }

    function getStatusIconClass(type) {
        if (type === "error") {
            return "fas fa-exclamation-circle";
        }
        if (type === "success") {
            return "fas fa-check-circle";
        }
        return "fas fa-info-circle";
    }

    function post_service_worker_message(message, timeoutMs) {
        return new Promise(function (resolve) {
            const channel = new MessageChannel();

            channel.port1.onmessage = function (event) {
                channel.port1.close();
                resolve(event.data);
            };

            setTimeout(function () {
                channel.port1.close();
                resolve(null);
            }, timeoutMs);

            navigator.serviceWorker.controller.postMessage(message, [channel.port2]);
        });
    }

    async function start_zip_keepalive() {
        if (zip_download_in_progress) {
            return;
        }

        zip_download_in_progress = true;
        let confirmedDone = false;

        try {
            while (true) {
                console.log("sending keepalive");
                let response;
                try {
                    response = await post_service_worker_message({type: "ZIP_KEEPALIVE_PING"}, 2000);
                } catch (_) {
                    console.log("keepalive failed");
                    break;
                }
                if (response === null) {
                    console.log("keepalive response timeout error");
                    break;
                }
                if (response.zipDownloadActive === false) {
                    console.log("no active downloads, stopping keepalive");
                    confirmedDone = true;
                    break;
                }
                console.log("keeping keepalive running");

                await new Promise(function (resolve) {
                    setTimeout(resolve, 3000);
                });
            }
        } finally {
            zip_download_in_progress = false;
            if (confirmedDone) {
                showStatus("ZIP download finished.", "success", 5000);
            }
        }
    }

    function escape_HTML(html_str) {
        const chars_repl = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;'
        };

        return html_str.replace(/[&<>"]/g, function (tag) {
            return chars_repl[tag];
        });
    }

    //modal stuff (https://dev.to/ara225/how-to-use-bootstrap-modals-without-jquery-3475)
    function openModal() {
        document.getElementById("backdrop").style.display = "block";
        document.getElementById("download-modal").style.display = "block";
        changeTemplate("raw");
    }

    function closeModal() {
        download_links_fill_request++;
        document.getElementById("backdrop").style.display = "none";
        document.getElementById("download-modal").style.display = "none";
        document.getElementById("download-links").value = "";
    }

    // Get the modal
    let modal = document.getElementById('download-modal');

    // When the user clicks anywhere outside the modal, close it
    window.onclick = function (event) {
        if (event.target === modal) {
            closeModal();
        }
    };
</script>
